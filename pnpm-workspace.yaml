packages:
  - 'ghost/*'
  - 'apps/*'
  - 'e2e'
  - 'koenig/*'
  - 'packages/**'
  - '!packages/_template'
  - 'configs/*'
  - 'scripts'

strictDepBuilds: true
catalogMode: strict

minimumReleaseAge: 4320 # 3 days in minutes; matches Renovate's minimumReleaseAge
blockExoticSubdeps: true

allowBuilds:
  # sentry-cli's postinstall downloads its binary, which is only used for
  # sourcemap upload — that was gated on the old Koenig repo's IS_SHIPPING
  # publish flow and isn't part of dev or CI builds here.
  '@sentry/cli': false
  '@swc/core': true
  better-sqlite3: true
  core-js: true
  cpu-features: false
  dtrace-provider: true
  esbuild: true
  fsevents: true
  msw: true
  nx: true
  protobufjs: true
  re2: true
  sharp: true
  sqlite3: true
  ssh2: false

