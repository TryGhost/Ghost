  # `typescript` resolves to the @typescript/typescript6 shim (the last JS-based
  # compiler, which still exposes the programmatic API + a `tsc6` binary) so that
  # typescript-eslint — which imports the compiler API and has no TS7-compatible
  # release until the 7.1 API lands — keeps working. The actual `tsc` the repo builds
  # and typechecks with is TypeScript 7.0 via `@typescript/native` below (its `tsc`
  # binary has no name clash with the shim's `tsc6`). Collapse back to a single
  # `typescript: <7.x>` entry once typescript-eslint supports the TS7.1 API.
  typescript: 'npm:@typescript/typescript6@6.0.2'
  '@typescript/native': 'npm:typescript@7.0.2'
  typescript-eslint: 8.62.1
