services:
  ghost-dev:
    environment:
      # Route Ghost transactional/test emails via Mailgun API instead of Mailpit.
      # This preserves Mailgun tags and user variables needed for email analytics.
      # Values come from the host environment/.env file.
      mail__transport: mailgun
      mail__options__host: ${MAILGUN_API_HOST:-api.mailgun.net}
      mail__options__port: 443
      mail__options__protocol: "https:"
      mail__options__auth__api_key: ${MAILGUN_API_KEY}
      mail__options__auth__domain: ${MAILGUN_DOMAIN}
