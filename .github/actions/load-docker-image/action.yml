name: 'Load Docker Image'
description: 'Load Docker image from registry or artifact based on build source'
inputs:
  use-artifact:
    description: 'Whether to load the image from an artifact (true) or pull from GHCR (false)'
    required: true
  image-tags:
    description: 'Docker image tags (multi-line string)'
    required: true
  artifact-name:
    description: 'Name of the artifact to download (fork PRs only)'
    required: false
    default: 'docker-image'

runs:
  using: 'composite'
  steps:
    - name: Download image artifact (artifact)
      if: inputs.use-artifact == 'true'
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
      with:
        name: ${{ inputs.artifact-name }}

    - name: Load image from artifact (artifact)
      if: inputs.use-artifact == 'true'
      shell: bash
      env:
        ARTIFACT_NAME: ${{ inputs.artifact-name }}
      run: |
        echo "Loading Docker image from artifact..."
        gunzip -c "${ARTIFACT_NAME}.tar.gz" | docker load
        echo "Available images after load:"
        docker images

    - name: Log in to GitHub Container Registry
      if: inputs.use-artifact == 'false'
      uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ github.token }}

    - name: Pull image from registry (main repo/branch)
      if: inputs.use-artifact == 'false'
      shell: bash
      env:
        IMAGE_TAGS: ${{ inputs.image-tags }}
      run: |
        IMAGE_TAG=$(printf '%s\n' "$IMAGE_TAGS" | head -n1)
        echo "Pulling image from registry: $IMAGE_TAG"
        docker pull "$IMAGE_TAG"

    - name: Verify image is available
      id: verify
      shell: bash
      env:
        IMAGE_TAGS: ${{ inputs.image-tags }}
      run: |
        IMAGE_TAG=$(printf '%s\n' "$IMAGE_TAGS" | head -n1)
        echo "Checking for image: $IMAGE_TAG"
        echo "image-tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"

        if docker inspect "$IMAGE_TAG" > /dev/null 2>&1; then
          echo "✅ Image $IMAGE_TAG is available"
        else
          echo "❌ Image $IMAGE_TAG is not available"
          echo "Available images:"
          docker images
          exit 1
        fi


outputs:
  image-tag:
    description: 'The Docker image tag to use'
    value: ${{ steps.verify.outputs.image-tag }}
