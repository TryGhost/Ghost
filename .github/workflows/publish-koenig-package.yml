name: Publish Koenig Package

# Escape hatch for urgent out-of-band publishes of a single koenig/* package.
# The normal path is the publish_koenig_packages job in ci.yml, which runs in
# the release (tag) lane and publishes every package changed since the
# previous release. Use this only when an npm consumer needs a fix before the
# next Ghost release.

on:
  workflow_dispatch:
    inputs:
      package:
        description: 'Package name (e.g. @tryghost/kg-default-nodes)'
        required: true
        type: string
      dry_run:
        description: 'Dry run (build and pack, skip the actual publish)'
        required: false
        type: boolean
        default: false

concurrency:
  group: publish-koenig-packages
  cancel-in-progress: false

env:
  NODE_VERSION: 22.23.1

jobs:
  publish:
    name: Publish ${{ inputs.package }}
    runs-on: ubuntu-latest
    if: github.repository == 'TryGhost/Ghost'
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure .npmrc
        run: |
          echo "@tryghost:registry=https://registry.npmjs.org/" >> ~/.npmrc

      # TODO: Check we can remove this once we update Node to v24
      - name: Install v11 of NPM # We need this to install packages via OIDC.
        run: npm install -g npm@11

      - name: Publish package
        env:
          # Passed via env rather than interpolated into the script: dispatch
          # inputs are untrusted shell data even on a manual workflow.
          PACKAGE: ${{ inputs.package }}
        run: node scripts/publish-koenig-packages.cjs --package "$PACKAGE" ${{ inputs.dry_run && '--dry-run' || '' }}
