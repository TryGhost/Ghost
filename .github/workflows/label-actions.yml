name: 'Label Issues & PRs'

on:
  workflow_dispatch:
  issues:
    types: [opened, closed, labeled]
  pull_request_target:
    types: [opened, closed, labeled]
  schedule:
    - cron:  '0 * * * *'

permissions:
  issues: write
  pull-requests: write

jobs:
  action:
    runs-on: ubuntu-slim
    if: github.repository_owner == 'TryGhost'
    steps:
      - uses: tryghost/actions/actions/label-actions@6fbe82c6461eee866b1995631d1fb30d6ce9515d # main
