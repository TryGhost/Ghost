name: Renovate

# Self-hosted Renovate runner. Replaces the Mend-hosted scheduler so we can tick
# more frequently than ~4h and clear the dependency backlog within the existing
# automerge windows. See PLA-48 for the throughput rationale;
# .github/renovate.json5 is still the source of truth for package rules,
# schedule, and automergeSchedule.
on:
  schedule:
    # Wake the runner only inside the windows where Renovate is actually
    # allowed to open or maintain PRs (see `schedule` in renovate.json5),
    # plus a single weekday daytime tick to service `vulnerabilityAlerts.
    # schedule: "at any time"` for CVE-driven PRs. Ticks outside those
    # windows aren't no-ops in practice — each one is a 20-30min full
    # extract — so the previous `17 * * * *` was burning ~17h/day of
    # Actions compute for no merge benefit.
    #
    # :17-past-the-hour offset avoids top-of-hour GH Actions scheduler
    # contention, which was dropping roughly every other tick on `0 * * * *`.
    # Hourly cadence inside active windows roughly matches Ghost's CI
    # duration, giving each merge a fresh rebase + green CI window.
    #
    # Times are UTC; matches renovate.json5's `schedule` block.
    # Monday morning window (Mon 00:00-12:59 UTC)
    - cron: '17 0-12 * * 1'
    # Weekday early-morning window (Tue-Sat 00:00-04:59 UTC)
    - cron: '17 0-4 * * 2-6'
    # Weekday evening window (Mon-Fri 21:00-23:59 UTC)
    - cron: '17 21-23 * * 1-5'
    # Weekend - every 2h is plenty; no automerge urgency, just batch creation
    - cron: '17 */2 * * 0,6'
    # Weekday daytime CVE pickup tick (Mon-Fri 14:17 UTC)
    - cron: '17 14 * * 1-5'
  workflow_dispatch:
    inputs:
      ignoreSchedule:
        description: 'Ignore Renovate schedule for this manual run'
        required: false
        default: false
        type: boolean

concurrency:
  group: renovate
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  renovate:
    # Pause without merging a PR: set repo variable RENOVATE_PAUSED=true
    # (Settings → Secrets and variables → Actions → Variables). Manual
    # workflow_dispatch runs are exempt so you can still force a run while
    # paused. The "Disable workflow" toggle in the Actions UI also works as
    # a faster emergency stop.
    if: ${{ vars.RENOVATE_PAUSED != 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Get GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          app-id: ${{ secrets.TRYGHOST_RENOVATE_APP_ID }}
          private-key: ${{ secrets.TRYGHOST_RENOVATE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: Ghost

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      # True global cap on open Renovate PRs. Renovate's own
      # `prConcurrentLimit` is per-run scoped (counts only branches in the
      # current run's update list), so a global cap has to live outside
      # Renovate. Count open PRs authored by the Renovate App; if at or
      # above the cap, skip this tick. The next scheduled tick will run
      # once automerge/review has drained the queue below the cap.
      #
      # Exemptions (always run regardless of backlog):
      #   - workflow_dispatch — manual force-runs always proceed.
      #   - The 14:17 UTC weekday CVE-pickup tick — exists specifically to
      #     service `vulnerabilityAlerts.schedule: "at any time"`, and
      #     vulnerability alerts bypass Renovate's own concurrent limits
      #     by design. We don't want a stale backlog to block CVE flow.
      #
      # Tune via repo variable `RENOVATE_OPEN_PR_CAP` (default 10).
      - name: Check open Renovate PR count
        id: pr-cap
        if: ${{ github.event_name == 'schedule' && github.event.schedule != '17 14 * * 1-5' }}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_CAP: ${{ vars.RENOVATE_OPEN_PR_CAP || '10' }}
        run: |
          set -euo pipefail
          open_count=$(gh pr list \
            --repo "${{ github.repository }}" \
            --author "app/tryghost-renovate" \
            --state open \
            --json number --jq 'length')
          echo "Renovate has $open_count open PRs (cap: $PR_CAP)"
          if [ "$open_count" -ge "$PR_CAP" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping Renovate run — $open_count open PRs at or above cap of $PR_CAP. Drain the queue or raise RENOVATE_OPEN_PR_CAP."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Allow manual run outside schedule
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.ignoreSchedule }}
        run: echo 'RENOVATE_FORCE={"schedule":null,"automergeSchedule":null}' >> "$GITHUB_ENV"

      - name: Self-hosted Renovate
        if: ${{ steps.pr-cap.outputs.skip != 'true' }}
        uses: renovatebot/github-action@693b9ef15eec82123529a37c782242f091365961 # v46.1.14
        with:
          token: ${{ steps.app-token.outputs.token }}
        env:
          LOG_LEVEL: debug
          RENOVATE_REPOSITORY_CACHE: enabled
          RENOVATE_REPOSITORIES: TryGhost/Ghost
          # Ghost is already onboarded via Mend; don't open an onboarding PR.
          RENOVATE_ONBOARDING: 'false'
